<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4XLIFE - AI Trading Signals</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0a0f; color: #e0e0e0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; padding: 20px; background: #1a1a2e; border-radius: 20px; }
        h1 { background: linear-gradient(135deg, #00ff88, #00cc66); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .free-badge { display: inline-block; background: #00ff8822; color: #00ff88; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .timer { text-align: center; margin: 20px 0; padding: 10px; background: #1a1a2e; border-radius: 12px; color: #ffd700; font-size: 14px; }
        .signal-card { background: #1a1a2e; border-radius: 16px; padding: 20px; margin-bottom: 20px; border-left: 4px solid; }
        .signal-card.ELITE { border-left-color: #ffd700; }
        .signal-card.STANDARD { border-left-color: #00ff88; }
        .signal-card.AGGRESSIVE { border-left-color: #ff8844; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .pair { font-size: 22px; font-weight: bold; }
        .action-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .action-badge.BUY { background: #00ff8822; color: #00ff88; border: 1px solid #00ff88; }
        .action-badge.SELL { background: #ff444422; color: #ff4444; border: 1px solid #ff4444; }
        .confidence { padding: 4px 12px; border-radius: 20px; font-size: 12px; background: #2a2a3e; }
        .price-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 15px 0; padding: 15px; background: #0a0a0f; border-radius: 12px; }
        .price-item { text-align: center; }
        .price-label { font-size: 11px; color: #888; margin-bottom: 5px; }
        .price-value { font-size: 18px; font-weight: bold; }
        .price-value.entry { color: #ffd700; }
        .price-value.sl { color: #ff4444; }
        .tp-row { display: flex; gap: 10px; margin: 15px 0; }
        .tp-item { flex: 1; text-align: center; padding: 10px; background: #0a0a0f; border-radius: 12px; }
        .tp-label { font-size: 10px; color: #888; margin-bottom: 5px; }
        .tp-value { font-size: 14px; font-weight: bold; color: #00ff88; }
        .rr-badge { font-size: 10px; color: #888; margin-top: 4px; }
        .validation-badge { margin-top: 15px; padding: 8px; background: #00ff8810; border-radius: 8px; font-size: 11px; color: #00ff88; text-align: center; }
        .no-signals { text-align: center; padding: 60px; background: #1a1a2e; border-radius: 16px; }
        .footer { text-align: center; margin-top: 40px; padding: 20px; font-size: 11px; color: #555; border-top: 1px solid #1a1a2e; }
        .loading { animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 4XLIFE AI Signals</h1>
            <div class="free-badge">🔓 FREE FOREVER</div>
            <div style="font-size: 11px; margin-top: 10px; color: #888;">⚠️ Educational only. Not financial advice.</div>
        </div>

        <div class="timer" id="timer">🔄 Next scan in 5:00</div>

        <div id="signals-container">
            <div class="no-signals loading">📡 Loading AI signals...</div>
        </div>

        <div class="footer">
            <p>Powered by Gemini AI • Twelve Data • Free Forever</p>
            <p style="margin-top: 5px;">Auto-refresh every 5 minutes | Validated signals only</p>
        </div>
    </div>

    <script>
        // ============================================
        // 🔑 YOUR API KEYS - PUT THEM HERE
        // ============================================
        
        // Get from: https://twelvedata.com/apikey
        const TWELVEDATA_KEY = "924ebbf5ccc14ca38de8677ced98b61c";
        
        // Get from: https://makersuite.google.com/app/apikey
        const GEMINI_KEY = "AQ.Ab8RN6I3jz2m4WlcyEuTG0hNP9DfUlU_-pZ2_88v4Q_fPraSiw";
        
        // ============================================
        
        const PAIRS = ["EURUSD", "GBPUSD", "BTCUSD", "ETHUSD", "XAUUSD"];
        
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        function formatPrice(price, pair) {
            if (!price) return "---";
            if (pair === "BTCUSD") return price.toFixed(0);
            if (pair === "ETHUSD") return price.toFixed(0);
            if (pair === "XAUUSD") return price.toFixed(2);
            if (pair.includes("JPY")) return price.toFixed(3);
            return price.toFixed(5);
        }
        
        function getMinSL(pair) {
            const rules = {
                "BTCUSD": 200,
                "ETHUSD": 15,
                "XAUUSD": 80,
                "EURUSD": 0.0005,
                "GBPUSD": 0.0005
            };
            return rules[pair] || 0;
        }
        
        function getSignalType(confidence) {
            if (confidence >= 85) return "ELITE";
            if (confidence >= 70) return "STANDARD";
            return "AGGRESSIVE";
        }
        
        function validateSignal(signal) {
            if (!signal.entry || !signal.stopLoss) return false;
            if (signal.entry === 0 || signal.stopLoss === 0) return false;
            
            const slDist = Math.abs(signal.entry - signal.stopLoss);
            const minSL = getMinSL(signal.pair);
            
            if (slDist < minSL) {
                console.log(`❌ ${signal.pair}: SL ${slDist} < min ${minSL}`);
                return false;
            }
            
            const tp1Dist = Math.abs(signal.entry - signal.takeProfit1);
            if (tp1Dist < slDist * 0.9) return false;
            
            if (signal.action === "BUY" && signal.stopLoss >= signal.entry) return false;
            if (signal.action === "SELL" && signal.stopLoss <= signal.entry) return false;
            
            console.log(`✅ ${signal.pair}: VALID`);
            return true;
        }
        
        async function getCurrentPrices() {
            const prices = {};
            
            for (const pair of PAIRS) {
                try {
                    const url = `https://api.twelvedata.com/price?symbol=${pair}&apikey=${TWELVEDATA_KEY}`;
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    if (data.price) {
                        prices[pair] = parseFloat(data.price);
                        console.log(`✅ Price ${pair}: ${prices[pair]}`);
                    } else {
                        console.log(`⚠️ No price for ${pair}`);
                    }
                    
                    await sleep(1000);
                } catch (error) {
                    console.log(`❌ Failed ${pair}:`, error);
                }
            }
            
            return prices;
        }
        
        function getFallbackSignal(pair, currentPrice) {
            const minSL = getMinSL(pair);
            let slDist = minSL;
            
            if (pair === "EURUSD" || pair === "GBPUSD") slDist = 0.0010;
            if (pair === "BTCUSD") slDist = 250;
            if (pair === "ETHUSD") slDist = 20;
            if (pair === "XAUUSD") slDist = 100;
            
            return {
                pair: pair,
                action: "BUY",
                entry: currentPrice,
                stopLoss: currentPrice - slDist,
                takeProfit1: currentPrice + slDist,
                takeProfit2: currentPrice + (slDist * 2),
                takeProfit3: currentPrice + (slDist * 3),
                confidence: 70
            };
        }
        
        async function getAISignal(pair, currentPrice) {
            const minSL = getMinSL(pair);
            
            const prompt = `Generate a trading signal for ${pair} at price ${currentPrice}.
            
Return ONLY valid JSON (no markdown, no extra text, no explanation):
{
    "action": "BUY or SELL",
    "stop_loss": number,
    "take_profit_1": number,
    "take_profit_2": number,
    "take_profit_3": number,
    "confidence": number between 60-100
}

RULES for ${pair}:
- Stop loss must be at least ${minSL} away from entry (${currentPrice})
- For BUY: stop_loss < ${currentPrice}, all TPs > ${currentPrice}
- For SELL: stop_loss > ${currentPrice}, all TPs < ${currentPrice}
- TP1 = ${currentPrice} ± (SL distance × 1)
- TP2 = ${currentPrice} ± (SL distance × 2)
- TP3 = ${currentPrice} ± (SL distance × 3)
- NEVER return null, dash, or zero
- confidence must be realistic based on market conditions

Example for BUY (${pair}):
{
    "action": "BUY",
    "stop_loss": ${currentPrice - minSL},
    "take_profit_1": ${currentPrice + minSL},
    "take_profit_2": ${currentPrice + (minSL * 2)},
    "take_profit_3": ${currentPrice + (minSL * 3)},
    "confidence": 75
}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: prompt }]
                        }]
                    })
                });
                
                const data = await response.json();
                
                if (!data.candidates || !data.candidates[0]) {
                    console.log(`⚠️ No response from Gemini for ${pair}`);
                    return getFallbackSignal(pair, currentPrice);
                }
                
                let aiText = data.candidates[0].content.parts[0].text;
                aiText = aiText.replace('```json', '').replace('```', '').trim();
                
                const aiSignal = JSON.parse(aiText);
                
                return {
                    pair: pair,
                    action: aiSignal.action,
                    entry: currentPrice,
                    stopLoss: aiSignal.stop_loss,
                    takeProfit1: aiSignal.take_profit_1,
                    takeProfit2: aiSignal.take_profit_2,
                    takeProfit3: aiSignal.take_profit_3,
                    confidence: aiSignal.confidence
                };
                
            } catch (error) {
                console.log(`⚠️ AI failed for ${pair}:`, error.message);
                return getFallbackSignal(pair, currentPrice);
            }
        }
        
        async function getAllSignals() {
            console.log("📡 Getting prices...");
            const prices = await getCurrentPrices();
            
            const validSignals = [];
            
            for (const pair of PAIRS) {
                const price = prices[pair];
                if (price) {
                    console.log(`🤖 Getting AI signal for ${pair}...`);
                    const signal = await getAISignal(pair, price);
                    
                    if (validateSignal(signal)) {
                        validSignals.push(signal);
                        console.log(`✅ ${pair} ACCEPTED`);
                    } else {
                        console.log(`❌ ${pair} REJECTED`);
                    }
                    
                    await sleep(2000);
                } else {
                    console.log(`⚠️ No price for ${pair}, skipping`);
                }
            }
            
            displaySignals(validSignals);
            return validSignals;
        }
        
        function displaySignals(signals) {
            const container = document.getElementById('signals-container');
            
            if (!signals || signals.length === 0) {
                container.innerHTML = `
                    <div class="no-signals">
                        <p>🔍 No valid signals found</p>
                        <p style="margin-top: 10px; font-size: 12px; color: #888;">All signals failed validation</p>
                        <p style="margin-top: 20px; font-size: 12px;">Next scan in <span id="countdown">5:00</span></p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = signals.map(signal => {
                const slDist = Math.abs(signal.entry - signal.stopLoss);
                const tp1Dist = Math.abs(signal.entry - signal.takeProfit1);
                const rr1 = (tp1Dist / slDist).toFixed(1);
                const signalType = getSignalType(signal.confidence);
                
                return `
                    <div class="signal-card ${signalType}">
                        <div class="card-header">
                            <span class="pair">${signal.pair}</span>
                            <span class="action-badge ${signal.action}">${signal.action}</span>
                            <span class="confidence">${signal.confidence}%</span>
                        </div>
                        
                        <div class="price-row">
                            <div class="price-item">
                                <div class="price-label">📊 ENTRY</div>
                                <div class="price-value entry">${formatPrice(signal.entry, signal.pair)}</div>
                            </div>
                            <div class="price-item">
                                <div class="price-label">🛑 STOP LOSS</div>
                                <div class="price-value sl">${formatPrice(signal.stopLoss, signal.pair)}</div>
                            </div>
                        </div>
                        
                        <div class="tp-row">
                            <div class="tp-item">
                                <div class="tp-label">🎯 TP1</div>
                                <div class="tp-value">${formatPrice(signal.takeProfit1, signal.pair)}</div>
                                <div class="rr-badge">RR ${rr1}</div>
                            </div>
                            <div class="tp-item">
                                <div class="tp-label">🎯 TP2</div>
                                <div class="tp-value">${formatPrice(signal.takeProfit2, signal.pair)}</div>
                                <div class="rr-badge">RR ${(rr1 * 2).toFixed(1)}</div>
                            </div>
                            <div class="tp-item">
                                <div class="tp-label">🎯 TP3</div>
                                <div class="tp-value">${formatPrice(signal.takeProfit3, signal.pair)}</div>
                                <div class="rr-badge">RR ${(rr1 * 3).toFixed(1)}</div>
                            </div>
                        </div>
                        
                        <div class="validation-badge">
                            ✅ Validated: SL ✓ | Min Distance ✓ | RR ${rr1} ✓
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Countdown timer
        let minutes = 5;
        let seconds = 0;
        
        function startCountdown() {
            setInterval(() => {
                if (seconds === 0) {
                    if (minutes === 0) {
                        minutes = 5;
                        seconds = 0;
                        getAllSignals();
                    } else {
                        minutes--;
                        seconds = 59;
                    }
                } else {
                    seconds--;
                }
                
                const timerEl = document.getElementById('timer');
                if (timerEl) {
                    timerEl.innerHTML = `🔄 Next scan in ${minutes}:${seconds.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }
        
        // Start the app
        console.log("🚀 Starting 4XLIFE AI Signals...");
        getAllSignals();
        startCountdown();
        setInterval(getAllSignals, 300000);
    </script>
</body>
</html>
