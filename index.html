<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>4XLIFE - FREE Trading Signals</title>
    <style>
        body { background: #0a0a0f; color: #e0e0e0; font-family: Arial; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { background: linear-gradient(135deg, #00ff88, #00cc66); -webkit-background-clip: text; background-clip: text; color: transparent; text-align: center; }
        .free-badge { display: block; text-align: center; background: #00ff8822; color: #00ff88; padding: 4px 12px; border-radius: 20px; width: 180px; margin: 10px auto; }
        .no-credit-badge { display: block; text-align: center; background: #ffd70022; color: #ffd700; padding: 4px 12px; border-radius: 20px; width: 200px; margin: 10px auto; font-size: 12px; }
        .timer { text-align: center; margin: 20px 0; padding: 10px; background: #1a1a2e; border-radius: 12px; color: #ffd700; }
        .signal-card { background: #1a1a2e; border-radius: 16px; padding: 20px; margin-bottom: 20px; border-left: 4px solid #00ff88; }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 15px; flex-wrap: wrap; }
        .pair { font-size: 22px; font-weight: bold; }
        .action-badge.BUY { background: #00ff8822; color: #00ff88; padding: 4px 12px; border-radius: 20px; }
        .action-badge.SELL { background: #ff444422; color: #ff4444; padding: 4px 12px; border-radius: 20px; }
        .price-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 15px 0; padding: 15px; background: #0a0a0f; border-radius: 12px; text-align: center; }
        .price-value { font-size: 18px; font-weight: bold; }
        .price-value.entry { color: #ffd700; }
        .price-value.sl { color: #ff4444; }
        .tp-row { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        .tp-item { flex: 1; text-align: center; padding: 10px; background: #0a0a0f; border-radius: 12px; min-width: 80px; }
        .tp-value { color: #00ff88; font-weight: bold; }
        .footer { text-align: center; margin-top: 40px; padding: 20px; font-size: 11px; color: #555; }
        .no-signals { text-align: center; padding: 60px; background: #1a1a2e; border-radius: 16px; }
        .note { text-align: center; margin-top: 10px; font-size: 11px; color: #ffd700; }
        .price-up { color: #00ff88; }
        .price-down { color: #ff4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 4XLIFE Signals</h1>
        <div class="free-badge">🔓 FREE FOREVER</div>
        <div class="no-credit-badge">💯 NO CREDITS • NO API KEY</div>
        <div class="timer" id="timer">🔄 Next scan in 5:00</div>
        <div id="signals-container"><div class="no-signals">📡 Loading signals...</div></div>
        <div class="footer">
            <p>Powered by Yahoo Finance • 100% Free • No Credits • No Limits</p>
            <p class="note">✅ NO API KEY NEEDED ✅ NO CREDIT CARD ✅ NO REGISTRATION</p>
        </div>
    </div>

    <script>
        // ============================================
        // USING CORS PROXY - NO BLOCKING!
        // ============================================
        
        const PAIRS = [
            { symbol: "EURUSD=X", name: "EURUSD", digits: 5 },
            { symbol: "GBPUSD=X", name: "GBPUSD", digits: 5 },
            { symbol: "BTC-USD", name: "BTCUSD", digits: 0 },
            { symbol: "ETH-USD", name: "ETHUSD", digits: 0 },
            { symbol: "GC=F", name: "XAUUSD", digits: 2 }
        ];
        
        // CORS proxy (free, no registration)
        const CORS_PROXY = "https://api.allorigins.win/raw?url=";
        
        function getMinSL(pairName) {
            const rules = { 
                "BTCUSD": 200, 
                "ETHUSD": 15, 
                "XAUUSD": 80, 
                "EURUSD": 0.0010, 
                "GBPUSD": 0.0010 
            };
            return rules[pairName] || 0;
        }
        
        function generateSignal(pairName, price) {
            const minSL = getMinSL(pairName);
            let slDist = minSL;
            
            // Use price last digit for signal direction
            const priceInt = Math.floor(price * 100);
            const isBuy = priceInt % 2 === 0;
            const action = isBuy ? "BUY" : "SELL";
            
            if (action === "BUY") {
                return {
                    pair: pairName, 
                    action: action, 
                    entry: price,
                    stopLoss: price - slDist,
                    takeProfit1: price + slDist,
                    takeProfit2: price + (slDist * 2),
                    takeProfit3: price + (slDist * 3),
                    confidence: Math.floor(65 + (priceInt % 25))
                };
            } else {
                return {
                    pair: pairName, 
                    action: action, 
                    entry: price,
                    stopLoss: price + slDist,
                    takeProfit1: price - slDist,
                    takeProfit2: price - (slDist * 2),
                    takeProfit3: price - (slDist * 3),
                    confidence: Math.floor(65 + (priceInt % 25))
                };
            }
        }
        
        function validateSignal(signal) {
            const slDist = Math.abs(signal.entry - signal.stopLoss);
            const minSL = getMinSL(signal.pair);
            if (slDist < minSL) return false;
            if (signal.action === "BUY" && signal.stopLoss >= signal.entry) return false;
            if (signal.action === "SELL" && signal.stopLoss <= signal.entry) return false;
            return true;
        }
        
        async function getYahooPrice(symbol) {
            const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}`;
            const proxyUrl = CORS_PROXY + encodeURIComponent(yahooUrl);
            
            try {
                const response = await fetch(proxyUrl);
                const text = await response.text();
                const data = JSON.parse(text);
                const price = data.chart.result[0].meta.regularMarketPrice;
                return price;
            } catch(e) {
                console.log(`Error ${symbol}:`, e.message);
                return null;
            }
        }
        
        function formatPrice(price, pairName, digits) {
            if (!price) return "---";
            if (pairName === "BTCUSD") return price.toFixed(0);
            if (pairName === "ETHUSD") return price.toFixed(0);
            if (pairName === "XAUUSD") return price.toFixed(2);
            return price.toFixed(5);
        }
        
        async function getAllSignals() {
            const container = document.getElementById('signals-container');
            container.innerHTML = '<div class="no-signals">📡 Fetching prices...<br><br>🔄 Using Yahoo Finance (Free)</div>';
            
            const signals = [];
            for (const pair of PAIRS) {
                const price = await getYahooPrice(pair.symbol);
                if (price && price > 0) {
                    const signal = generateSignal(pair.name, price);
                    if (validateSignal(signal)) {
                        signals.push(signal);
                        console.log(`✅ ${pair.name}: ${price}`);
                    }
                } else {
                    console.log(`❌ ${pair.name}: No price`);
                }
                await new Promise(r => setTimeout(r, 1500));
            }
            
            if (signals.length === 0) {
                container.innerHTML = `
                    <div class="no-signals">
                        🔍 Waiting for prices...<br><br>
                        <span style="font-size: 12px;">Yahoo Finance is loading</span><br>
                        <span style="font-size: 11px; color: #888;">This may take 10-15 seconds on first load</span>
                    </div>`;
                return;
            }
            
            container.innerHTML = signals.map(s => {
                const slDist = Math.abs(s.entry - s.stopLoss);
                const tp1Dist = Math.abs(s.entry - s.takeProfit1);
                const rr1 = (tp1Dist / slDist).toFixed(1);
                return `
                    <div class="signal-card">
                        <div class="card-header">
                            <span class="pair">${s.pair}</span>
                            <span class="action-badge ${s.action}">${s.action} ${s.confidence}%</span>
                        </div>
                        <div class="price-row">
                            <div><div>📊 ENTRY</div><div class="price-value entry">${formatPrice(s.entry, s.pair)}</div></div>
                            <div><div>🛑 STOP LOSS</div><div class="price-value sl">${formatPrice(s.stopLoss, s.pair)}</div></div>
                        </div>
                        <div class="tp-row">
                            <div class="tp-item"><div>🎯 TP1</div><div class="tp-value">${formatPrice(s.takeProfit1, s.pair)}</div><div style="font-size:10px;">RR ${rr1}</div></div>
                            <div class="tp-item"><div>🎯 TP2</div><div class="tp-value">${formatPrice(s.takeProfit2, s.pair)}</div><div style="font-size:10px;">RR ${(rr1*2).toFixed(1)}</div></div>
                            <div class="tp-item"><div>🎯 TP3</div><div class="tp-value">${formatPrice(s.takeProfit3, s.pair)}</div><div style="font-size:10px;">RR ${(rr1*3).toFixed(1)}</div></div>
                        </div>
                        <div style="margin-top: 12px; font-size: 10px; color: #00ff88; text-align: center;">
                            ✅ Validated | SL: ${slDist.toFixed(2)} | Min: ${getMinSL(s.pair)}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Countdown timer
        let minutes = 5, seconds = 0;
        setInterval(() => {
            if (seconds === 0) {
                if (minutes === 0) { minutes = 5; getAllSignals(); }
                else { minutes--; seconds = 59; }
            } else { seconds--; }
            const timerEl = document.getElementById('timer');
            if (timerEl) timerEl.innerHTML = `🔄 Next scan in ${minutes}:${seconds.toString().padStart(2,'0')}`;
        }, 1000);
        
        // Start
        getAllSignals();
        setInterval(getAllSignals, 300000);
    </script>
</body>
</html>
